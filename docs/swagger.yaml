openapi: 3.0.0

info:
  title: MiniBlog API
  version: 1.0.0
  description: API REST para gestionar autores y publicaciones

servers:
  - url: https://miniblog-api-production-18a1.up.railway.app

paths:

  /authors:
    get:
      summary: Obtener todos los autores

      responses:
        200:
          description: Lista de autores

    post:
      summary: Crear un nuevo autor

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                name:
                  type: string

                email:
                  type: string

                bio:
                  type: string

      responses:
        201:
          description: Autor creado correctamente

  /authors/{id}:
    get:
      summary: Obtener autor por ID

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

      responses:
        200:
          description: Autor encontrado

        404:
          description: Autor no encontrado

    put:
      summary: Actualizar autor por ID

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                name:
                  type: string

                email:
                  type: string

                bio:
                  type: string

      responses:
        200:
          description: Autor actualizado correctamente

        404:
          description: Autor no encontrado

    delete:
      summary: Eliminar autor por ID

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

      responses:
        204:
          description: Autor eliminado correctamente

        404:
          description: Autor no encontrado

  /posts:
    get:
      summary: Obtener todos los posts

      responses:
        200:
          description: Lista de posts

    post:
      summary: Crear un nuevo post

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                title:
                  type: string

                content:
                  type: string

                author_id:
                  type: integer

                published:
                  type: boolean

      responses:
        201:
          description: Post creado correctamente

  /posts/author/{authorId}:
    get:
      summary: Obtener posts de un autor específico

      parameters:
        - in: path
          name: authorId
          required: true

          schema:
            type: integer

      responses:
        200:
          description: Lista de posts del autor

        404:
          description: No se encontraron posts para este autor

  /posts/{id}:
    get:
      summary: Obtener post por ID

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

      responses:
        200:
          description: Post encontrado

        404:
          description: Post no encontrado

    put:
      summary: Actualizar post por ID

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                title:
                  type: string

                content:
                  type: string

                author_id:
                  type: integer

                published:
                  type: boolean

      responses:
        200:
          description: Post actualizado correctamente

        404:
          description: Post no encontrado

    delete:
      summary: Eliminar post por ID

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: integer

      responses:
        204:
          description: Post eliminado correctamente

        404:
          description: Post no encontrado