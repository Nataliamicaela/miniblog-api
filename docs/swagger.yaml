openapi: 3.0.0

info:
  title: MiniBlog API
  version: 1.0.0
  description: API REST para gestionar autores y publicaciones

servers:
  - url: https://miniblog-api-production-18a1.up.railway.app

paths:

  /authors:
    get:
      summary: Obtener todos los autores

      responses:
        200:
          description: Lista de autores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'

    post:
      summary: Crear un nuevo autor

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'

      responses:
        201:
          description: Autor creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        400:
          description: Datos inválidos o email duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /authors/{id}:
    get:
      summary: Obtener autor por ID

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1

      responses:
        200:
          description: Autor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Autor no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Actualizar autor por ID

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorUpdate'

      responses:
        200:
          description: Autor actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        400:
          description: ID inválido o email duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Autor no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Eliminar autor por ID

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1

      responses:
        204:
          description: Autor eliminado correctamente
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Autor no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts:
    get:
      summary: Obtener todos los posts

      responses:
        200:
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'

    post:
      summary: Crear un nuevo post

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'

      responses:
        201:
          description: Post creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        400:
          description: Datos inválidos o autor inexistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts/author/{authorId}:
    get:
      summary: Obtener posts de un autor específico

      parameters:
        - in: path
          name: authorId
          required: true
          schema:
            type: integer
          example: 1

      responses:
        200:
          description: Lista de posts del autor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: No se encontraron posts para este autor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts/{id}:
    get:
      summary: Obtener post por ID

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1

      responses:
        200:
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Actualizar post por ID

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdate'

      responses:
        200:
          description: Post actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        400:
          description: ID inválido o autor inexistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Eliminar post por ID

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1

      responses:
        204:
          description: Post eliminado correctamente
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /comments:
    get:
      summary: Obtener todos los comentarios

      responses:
        200:
          description: Lista de comentarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'

    post:
      summary: Crear un nuevo comentario

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentInput'

      responses:
        201:
          description: Comentario creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        400:
          description: Datos inválidos o post/autor inexistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /comments/post/{postId}:
    get:
      summary: Obtener comentarios de un post específico

      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: integer
          example: 1

      responses:
        200:
          description: Lista de comentarios del post
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: No se encontraron comentarios para este post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /comments/{id}:
    get:
      summary: Obtener comentario por ID

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1

      responses:
        200:
          description: Comentario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Comentario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Eliminar comentario por ID

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1

      responses:
        204:
          description: Comentario eliminado correctamente
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Comentario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

# ─────────────────────────────────────────
# Schemas reutilizables
# ─────────────────────────────────────────
components:
  schemas:

    # Author completo (response)
    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Ana García"
        email:
          type: string
          example: "ana@example.com"
        bio:
          type: string
          example: "Desarrolladora full-stack apasionada por Node.js"
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    # Author para POST (campos requeridos marcados)
    AuthorInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          example: "Ana García"
        email:
          type: string
          example: "ana@example.com"
        bio:
          type: string
          example: "Desarrolladora full-stack apasionada por Node.js"

    # Author para PUT (todos opcionales, se actualiza con COALESCE)
    AuthorUpdate:
      type: object
      properties:
        name:
          type: string
          example: "Ana García"
        email:
          type: string
          example: "ana@example.com"
        bio:
          type: string
          example: "Desarrolladora full-stack apasionada por Node.js"

    # Post completo (response — incluye datos del autor por el JOIN)
    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Introducción a Node.js"
        content:
          type: string
          example: "Node.js es un runtime de JavaScript..."
        published:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        author_name:
          type: string
          example: "Ana García"
        author_email:
          type: string
          example: "ana@example.com"

    # Post para POST (campos requeridos marcados)
    PostInput:
      type: object
      required:
        - title
        - content
        - author_id
      properties:
        title:
          type: string
          example: "Introducción a Node.js"
        content:
          type: string
          example: "Node.js es un runtime de JavaScript..."
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: false

    # Post para PUT (todos opcionales)
    PostUpdate:
      type: object
      properties:
        title:
          type: string
          example: "Introducción a Node.js"
        content:
          type: string
          example: "Node.js es un runtime de JavaScript..."
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: true

    # Comment completo (response — incluye datos del post y autor por el JOIN)
    Comment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        content:
          type: string
          example: "Excelente artículo, muy claro."
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        post_title:
          type: string
          example: "Introducción a Node.js"
        author_name:
          type: string
          example: "Ana García"
        author_email:
          type: string
          example: "ana@example.com"

    # Comment para POST (campos requeridos marcados)
    CommentInput:
      type: object
      required:
        - post_id
        - author_id
        - content
      properties:
        post_id:
          type: integer
          example: 1
        author_id:
          type: integer
          example: 1
        content:
          type: string
          example: "Excelente artículo, muy claro."

    # Respuesta de error genérica
    Error:
      type: object
      properties:
        error:
          type: string
          example: "Author not found"